version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always

  app:
    build: .
    environment:
      - REDIS_HOST=redis
      - PORT=3000
    depends_on:
      - redis
    deploy:
      replicas: 3

  gateway:
    image: nginx:alpine
    ports:
      - "${PORT_PARAM}:80"
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro